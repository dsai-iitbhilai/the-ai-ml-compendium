name: Build Resources Index

on:
  push:
    branches: [main]
    paths:
      - '0*/**/*.md'
      - 'visualizers-and-playgrounds/**/*.md'

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build resources.json
        run: python scripts/build_resources_index.py
      - name: Commit and push resources.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources.json
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to resources.json"
            exit 0
          fi
          git commit -m "chore: update resources.json"
          # Pull with rebase to avoid conflicts from parallel workflows
          git pull --rebase origin main
          git push origin main
