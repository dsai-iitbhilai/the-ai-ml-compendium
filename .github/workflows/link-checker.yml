name: Link Checker

on:
  schedule:
    - cron: '0 0 1 * *'  # Monthly on the 1st
  pull_request:
    paths:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get changed files
        if: github.event_name == 'pull_request'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: '**/*.md'
          separator: ' '

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Set target files
        id: target
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "files=${{ steps.changed-files.outputs.all_changed_files }}" >> $GITHUB_OUTPUT
          else
            echo "files='./**/*.md'" >> $GITHUB_OUTPUT
          fi

      - name: Run lychee
        uses: lycheeverse/lychee-action@v1
        id: lychee
        # Only run if not PR OR there are actually modified markdown files
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.all_changed_files != ''
        with:
          args: >-
            --config .lycheeconfig.toml
            --cache .lycheecache
            --max-concurrency 8
            --no-progress
            ${{ steps.target.outputs.files }}
          fail: true

      - name: Upload link-check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: link-checker-report
          path: lychee/out.md
          retention-days: 14
