name: Link Checker

on:
  schedule:
    - cron: '0 0 1 * *'  # Monthly on the 1st
  pull_request:
    paths:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-
      - uses: lycheeverse/lychee-action@v1
        id: lychee
        with:
          args: >-
            --config .lycheeconfig.toml
            --cache .lycheecache
            --max-concurrency 8
            --no-progress
            './**/*.md'
          fail: true
      - name: Upload link-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-checker-report
          path: lychee/out.md
          retention-days: 14
