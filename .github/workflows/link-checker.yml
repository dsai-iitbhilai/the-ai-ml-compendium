name: Link Checker

on:
  schedule:
    - cron: '0 0 1 * *'  # Monthly on the 1st
  pull_request:
    paths:
      - '**.md'

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v1
        with:
          args: --config .lycheeconfig.toml --no-progress './**/*.md'
          fail: true
