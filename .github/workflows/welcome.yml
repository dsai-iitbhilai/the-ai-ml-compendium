name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to the **AI/ML Compendium**! Thanks for opening your first issue.

            A maintainer will review this soon. In the meantime:
            - Check out our [Contributing Guide](https://github.com/dsai-iitbhilai/the-ai-ml-compendium/blob/main/CONTRIBUTING.md)
            - Browse the [issue templates](https://github.com/dsai-iitbhilai/the-ai-ml-compendium/issues/new/choose) for structured ways to contribute

            Thanks for helping make this resource better! 🙏
          pr-message: |
            🎉 Thanks for your first pull request to the **AI/ML Compendium**!

            Please make sure you've reviewed the [PR Checklist](https://github.com/dsai-iitbhilai/the-ai-ml-compendium/blob/main/CONTRIBUTING.md#pr-checklist) before requesting review.

            A maintainer will take a look shortly. Welcome aboard! 🚀
