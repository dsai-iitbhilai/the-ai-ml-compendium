# lychee link checker configuration
# See https://github.com/lycheeverse/lychee/blob/master/config/lychee.toml

# Cache responses to avoid hammering servers
cache = true

# Request configuration
timeout = 30
retry_wait_time = 5
max_retries = 3

# Exclude patterns (URLs containing these patterns will be skipped)
exclude = [
  'localhost',
  '127.0.0.1',
  '0.0.0.0',
  'your-org',
  'placeholder',
  'example\.com',
  '\.\.\.',               # placeholder links with ...
  'youtube\.com/watch\?v=', # YouTube IDs may go stale; still worth checking
]

# Only check these schemes
scheme = ["https", "http"]

# Don't check mailto links
exclude_mail = true

# Accept these response codes as valid
accept = [
  200, 301, 302, 303, 307, 308,
  429,  # rate-limited — still alive
]
