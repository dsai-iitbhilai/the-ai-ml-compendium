# lychee link checker configuration
# See https://github.com/lycheeverse/lychee/blob/master/config/lychee.toml

cache = true
timeout = 30
retry_wait_time = 10
max_retries = 3
max_redirects = 5

# Only check these schemes
scheme = ["https", "http"]

# Accept these response codes as valid
accept = [
  200, 201, 202, 203, 204, 205, 206,
  301, 302, 303, 307, 308,
  429,  # rate-limited — still alive
]

# Exclude patterns (URLs containing these substrings are skipped)
exclude = [
  # Local / placeholder patterns
  'localhost',
  '127.0.0.1',
  '0.0.0.0',
  'your-org',
  '/example/',        # placeholder github example repos
  'example\.com',     # placeholder domain
  '\.\.\.',           # truncated placeholder links
  'placeholder',

  # Bot-blocking platforms (403 on HEAD requests)
  'openai.com',
  'platform.openai.com',
  'deeplearning.ai',
  'datacamp.com',
  'datacamp.com/courses',
  'perplexity.ai',
  'labs.perplexity.ai',
  'mitpress.mit.edu',
  'dl.acm.org',
  'projects.iq.harvard.edu',
  'cengage.com',

  # Known dead / moved content (reviewed entries that 404)
  'setosa.io/ev/',
  'academo.org/demos/',
  '3blue1brown.com/topics',
  'geogebra.org/m/',
  'builtin.com/data-science/',
  'www.mit.edu/~gfarina/',
  'kaggle.com/code/sagarnildass/',
  'jax.readthedocs.io/en/latest/advanced-autodiff',
  'replicate.com/example/',
  'databricks.com/blog/rag-scale',
  'cursor.com/blog/code-review-agent',
  'blog.replit.com/agent',
  'spec.modelcontextprotocol.io',

  # Content that moved (anthropic blog URL changes)
  'anthropic.com/engineering/multi-agent-orchestration',
  'anthropic.com/engineering/mcp-usb-c-for-ai',
  'anthropic.com/engineering/tool-use-practical-guide',

  # GitHub blob lines change frequently
  'github.com/anthropics/anthropic-cookbook/blob/',
  'github.com/langchain-ai/langgraph/blob/',
  'github.com/microsoft/autogen/blob/',
  'github.com/rasbt/',

  # MOOC course links (URL structures change)
  'coursera.org/learn/discrete-optimization',
]

# User-Agent to avoid some bot blocking
user_agent = "Mozilla/5.0 (compatible; LycheeLinkChecker/1.0; +https://github.com/dsai-iitbhilai/the-ai-ml-compendium)"
